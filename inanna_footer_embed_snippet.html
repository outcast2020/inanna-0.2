<script>
(function() {
  const footer = document.getElementById('inannaFooter');
  const track = document.getElementById('inannaTrack');
  const cat = document.getElementById('inannaCat');
  const shadow = document.getElementById('inannaShadow');

  if (!footer || !track || !cat || !shadow) return;

  let x = 12;
  let dir = 1;
  let speed = 0.58;
  let pausedUntil = 0;
  let mouseX = null;
  let mouseY = null;
  let nearPointer = false;
  let last = performance.now();
  let reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function footerMetrics() {
    const footerRect = footer.getBoundingClientRect();
    const catRect = cat.getBoundingClientRect();
    return {
      maxX: Math.max(footer.clientWidth - cat.offsetWidth - 8, 8),
      footerRect,
      catCenterX: x + cat.offsetWidth * 0.72,
      catCenterY: footer.clientHeight - cat.offsetHeight * 0.36
    };
  }

  function setPose(headX, headY, eyeX, eyeY, rotate) {
    cat.style.setProperty('--head-x', `${headX}px`);
    cat.style.setProperty('--head-y', `${headY}px`);
    cat.style.setProperty('--eye-x', `${eyeX}px`);
    cat.style.setProperty('--eye-y', `${eyeY}px`);
    cat.style.setProperty('--head-r', `${rotate}deg`);
  }

  function lookIdle() {
    setPose(dir > 0 ? 0.8 : -0.8, 0, dir > 0 ? .4 : -.4, 0, dir > 0 ? .8 : -.8);
  }

  function maybeLick(now) {
    if (cat.classList.contains('is-licking')) return;
    if (nearPointer || now < pausedUntil) return;
    if (Math.random() < 0.0026) {
      cat.classList.add('is-licking');
      setTimeout(() => cat.classList.remove('is-licking'), 850);
    }
  }

  function move(now) {
    const dt = Math.min(32, now - last);
    last = now;
    const {maxX, footerRect, catCenterX, catCenterY} = footerMetrics();
    const activePause = now < pausedUntil;

    if (!reduced && !activePause) {
      x += dir * speed * (dt / 16.67);
      if (x <= 8) {
        x = 8;
        dir = 1;
      } else if (x >= maxX) {
        x = maxX;
        dir = -1;
      }
    }

    const scaleX = dir === 1 ? 1 : -1;
    cat.style.transform = `translateX(${x}px) scaleX(${scaleX})`;
    shadow.style.transform = `translateX(${x + cat.offsetWidth * 0.18}px) scaleX(${scaleX})`;

    if (mouseX !== null && mouseY !== null) {
      const localX = mouseX - footerRect.left;
      const localY = mouseY - footerRect.top;
      const dx = localX - catCenterX;
      const dy = localY - catCenterY;
      const dist = Math.hypot(dx, dy);

      nearPointer = dist < 125;

      const headX = Math.max(-3.4, Math.min(3.4, dx * 0.03));
      const headY = Math.max(-2.8, Math.min(2.8, dy * 0.03));
      const eyeX = Math.max(-1.5, Math.min(1.5, dx * 0.02));
      const eyeY = Math.max(-1.5, Math.min(1.5, dy * 0.02));
      const rotate = Math.max(-7, Math.min(7, dx * 0.05));

      setPose(headX, headY, eyeX, eyeY, rotate);

      if (nearPointer && now > pausedUntil + 300) {
        pausedUntil = now + 1100;
      }
    } else {
      nearPointer = false;
      lookIdle();
    }

    cat.classList.toggle('is-paused', activePause || reduced);
    maybeLick(now);
    requestAnimationFrame(move);
  }

  function updatePointer(clientX, clientY) {
    mouseX = clientX;
    mouseY = clientY;
  }

  footer.addEventListener('mousemove', (e) => updatePointer(e.clientX, e.clientY), { passive: true });
  footer.addEventListener('mouseenter', (e) => updatePointer(e.clientX, e.clientY), { passive: true });
  footer.addEventListener('mouseleave', () => {
    mouseX = null;
    mouseY = null;
    nearPointer = false;
    pausedUntil = performance.now() + 500;
    lookIdle();
  });

  footer.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    if (t) updatePointer(t.clientX, t.clientY);
    pausedUntil = performance.now() + 900;
  }, { passive: true });

  footer.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (t) updatePointer(t.clientX, t.clientY);
  }, { passive: true });

  footer.addEventListener('touchend', () => {
    mouseX = null;
    mouseY = null;
  }, { passive: true });

  lookIdle();
  requestAnimationFrame(move);
})();
</script>
